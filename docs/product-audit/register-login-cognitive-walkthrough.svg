<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="2400" height="1700" viewBox="0 0 2400 1700">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7fbff"/>
      <stop offset="0.48" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#fffaf2"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#16324f" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="11" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L12,5 L0,10 Z" fill="#6b7b91"/>
    </marker>
    <style>
      text { font-family: 'Hiragino Sans GB', 'PingFang SC', 'Arial Unicode MS', 'Noto Sans CJK SC', sans-serif; }
      .title { font-size: 50px; font-weight: 800; letter-spacing: 0; }
      .subtitle { font-size: 23px; font-weight: 400; }
      .section { font-size: 25px; font-weight: 700; }
      .boxTitle { font-size: 27px; font-weight: 760; letter-spacing: 0; }
      .boxBody { font-size: 20px; font-weight: 400; }
      .edgeLabel { font-size: 18px; font-weight: 650; }
      .pill { font-size: 19px; font-weight: 700; }
      .small { font-size: 18px; }
    </style>
  </defs>
  <rect width="2400" height="1700" fill="url(#bg)"/>
  <text x="90" y="82" class="title" fill="#102033">注册 / 登录后的 Cognitive Walkthrough 导图</text>
  <text x="90" y="126" class="subtitle" fill="#526174">基于 Kest 前端代码整理：认证入口、项目落点、工作区模块，以及 API Request 与 Request Flow 的配合关系</text>
  <g><rect x="1840" y="58" width="430" height="48" rx="24" fill="#eaf5ff" stroke="#b8d8ff"/><text x="2055" y="90" text-anchor="middle" class="pill" fill="#174ea6">默认成功登录落点：/project</text></g>
  <text x="90" y="165" class="section" fill="#334155">1. 认证进入产品</text>
  <text x="90" y="695" class="section" fill="#334155">2. 进入项目后的工作路径</text>
  <text x="90" y="1120" class="section" fill="#334155">3. 执行反馈与用户认知</text>
  
<g id="entry"><rect x="90" y="190" width="420" height="185" rx="20" fill="#f8fbff" stroke="#c8d4e3" stroke-width="2" filter="url(#shadow)"/><rect x="90" y="190" width="8" height="185" rx="4" fill="#2563eb"/><text x="116" y="230" class="boxTitle" fill="#102033">入口：访问产品或受保护页</text><text x="118" y="266" class="boxBody" fill="#43536a">• 未登录访问 /project、/project/:id/* 时 </text><text x="118" y="295" class="boxBody" fill="#43536a">  AuthGuard 拦截</text><text x="118" y="328" class="boxBody" fill="#43536a">• 生成 /login?returnUrl=当前路径</text><text x="118" y="361" class="boxBody" fill="#43536a">• 已登录则直接渲染目标页面</text></g>

<g id="login"><rect x="650" y="120" width="420" height="190" rx="20" fill="#ffffff" stroke="#c8d4e3" stroke-width="2" filter="url(#shadow)"/><rect x="650" y="120" width="8" height="190" rx="4" fill="#0f766e"/><text x="676" y="160" class="boxTitle" fill="#102033">登录路径</text><text x="678" y="196" class="boxBody" fill="#43536a">• 输入用户名/邮箱 + 密码</text><text x="678" y="229" class="boxBody" fill="#43536a">• useLogin 成功后写入 session</text><text x="678" y="262" class="boxBody" fill="#43536a">• toast 欢迎反馈</text><text x="678" y="295" class="boxBody" fill="#43536a">• router.replace(returnUrl 或 /project)</text></g>

<g id="register"><rect x="650" y="365" width="420" height="220" rx="20" fill="#ffffff" stroke="#c8d4e3" stroke-width="2" filter="url(#shadow)"/><rect x="650" y="365" width="8" height="220" rx="4" fill="#7c3aed"/><text x="676" y="405" class="boxTitle" fill="#102033">注册路径</text><text x="678" y="441" class="boxBody" fill="#43536a">• 填写用户名、邮箱、昵称、电话、密码</text><text x="678" y="474" class="boxBody" fill="#43536a">• 校验确认密码和条款勾选</text><text x="678" y="507" class="boxBody" fill="#43536a">• 注册成功后立即自动登录</text><text x="678" y="540" class="boxBody" fill="#43536a">• 成功后跳 returnUrl 或 /project</text></g>

<g id="dashboard"><rect x="1220" y="220" width="470" height="250" rx="20" fill="#fbfffb" stroke="#c8d4e3" stroke-width="2" filter="url(#shadow)"/><rect x="1220" y="220" width="8" height="250" rx="4" fill="#16a34a"/><text x="1246" y="260" class="boxTitle" fill="#102033">项目 Dashboard：/project</text><text x="1248" y="296" class="boxBody" fill="#43536a">• 默认登录落点 authConfig.routes.afterLogin</text><text x="1248" y="329" class="boxBody" fill="#43536a">• 显示待处理邀请、项目数量、活跃项目数</text><text x="1248" y="362" class="boxBody" fill="#43536a">• 支持搜索、排序、网格/列表</text><text x="1248" y="395" class="boxBody" fill="#43536a">• 可以创建、编辑、删除项目</text></g>

<g id="empty"><rect x="1820" y="95" width="450" height="220" rx="20" fill="#fffdf5" stroke="#c8d4e3" stroke-width="2" filter="url(#shadow)"/><rect x="1820" y="95" width="8" height="220" rx="4" fill="#d97706"/><text x="1846" y="135" class="boxTitle" fill="#102033">没有项目时</text><text x="1848" y="171" class="boxBody" fill="#43536a">• 空状态提示用户从哪里开始</text><text x="1848" y="204" class="boxBody" fill="#43536a">• 创建新项目：成功后进 API Specs</text><text x="1848" y="237" class="boxBody" fill="#43536a">• Fork Demo：自动 seed 环境、规格、请求、测试</text><text x="1848" y="266" class="boxBody" fill="#43536a">  用例</text><text x="1848" y="299" class="boxBody" fill="#43536a">• 首次创建会触发 onboarding tour</text></g>

<g id="existing"><rect x="1820" y="380" width="450" height="200" rx="20" fill="#f8fbff" stroke="#c8d4e3" stroke-width="2" filter="url(#shadow)"/><rect x="1820" y="380" width="8" height="200" rx="4" fill="#0284c7"/><text x="1846" y="420" class="boxTitle" fill="#102033">已有项目 / 邀请</text><text x="1848" y="456" class="boxBody" fill="#43536a">• 接受邀请后进入邀请项目</text><text x="1848" y="489" class="boxBody" fill="#43536a">• 点击项目卡片进入 /project/:id/api-specs</text><text x="1848" y="522" class="boxBody" fill="#43536a">• 可继续管理项目基础信息</text><text x="1848" y="555" class="boxBody" fill="#43536a">• 失败或加载中都有状态反馈</text></g>

<g id="workspace"><rect x="90" y="760" width="470" height="235" rx="20" fill="#f8fbff" stroke="#c8d4e3" stroke-width="2" filter="url(#shadow)"/><rect x="90" y="760" width="8" height="235" rx="4" fill="#2563eb"/><text x="116" y="800" class="boxTitle" fill="#102033">项目工作区：/project/:id/*</text><text x="118" y="836" class="boxBody" fill="#43536a">• 项目根路径重定向到 API Specs</text><text x="118" y="869" class="boxBody" fill="#43536a">• 左侧模块导航形成产品心智</text><text x="118" y="902" class="boxBody" fill="#43536a">• Command Palette：Cmd/Ctrl+K</text><text x="118" y="935" class="boxBody" fill="#43536a">• 快捷键：g+p 回项目列表，g+a 回 API Specs</text></g>

<g id="modules"><rect x="660" y="715" width="430" height="310" rx="20" fill="#ffffff" stroke="#c8d4e3" stroke-width="2" filter="url(#shadow)"/><rect x="660" y="715" width="8" height="310" rx="4" fill="#475569"/><text x="686" y="755" class="boxTitle" fill="#102033">工作区模块</text><text x="688" y="791" class="boxBody" fill="#43536a">• Collections：API Request 工作台</text><text x="688" y="824" class="boxBody" fill="#43536a">• API Specs：接口契约、文档、示例</text><text x="688" y="857" class="boxBody" fill="#43536a">• Environments：base_url、变量、headers</text><text x="688" y="890" class="boxBody" fill="#43536a">• Test Cases：验证用例</text><text x="688" y="923" class="boxBody" fill="#43536a">• Members：协作权限</text><text x="688" y="956" class="boxBody" fill="#43536a">• Histories：执行记录</text><text x="688" y="989" class="boxBody" fill="#43536a">• Flows：多请求流程编排</text></g>

<g id="request"><rect x="1210" y="705" width="500" height="330" rx="20" fill="#f6fffb" stroke="#c8d4e3" stroke-width="2" filter="url(#shadow)"/><rect x="1210" y="705" width="8" height="330" rx="4" fill="#059669"/><text x="1236" y="745" class="boxTitle" fill="#102033">API Request：单个接口调用</text><text x="1238" y="781" class="boxBody" fill="#43536a">• 位于 Collections Workbench</text><text x="1238" y="814" class="boxBody" fill="#43536a">• 可创建 collection、request、scratchpad</text><text x="1238" y="847" class="boxBody" fill="#43536a">• 编辑 method、url、params、auth、headers、body、s</text><text x="1238" y="876" class="boxBody" fill="#43536a">  cripts、settings、examples</text><text x="1238" y="909" class="boxBody" fill="#43536a">• 选择 Environment 后替换 base_url/变量并合并 heade</text><text x="1238" y="938" class="boxBody" fill="#43536a">  rs</text><text x="1238" y="971" class="boxBody" fill="#43536a">• 发送由 localRunnerService.execute 执行</text><text x="1238" y="1004" class="boxBody" fill="#43536a">• 响应可保存为 example，已保存请求写入 Histories</text></g>

<g id="flow"><rect x="1790" y="705" width="500" height="330" rx="20" fill="#fff9fb" stroke="#c8d4e3" stroke-width="2" filter="url(#shadow)"/><rect x="1790" y="705" width="8" height="330" rx="4" fill="#db2777"/><text x="1816" y="745" class="boxTitle" fill="#102033">Request Flow：多步骤流程</text><text x="1818" y="781" class="boxBody" fill="#43536a">• React Flow 画布管理 flow、nodes、edges</text><text x="1818" y="814" class="boxBody" fill="#43536a">• 每个 step 保存 method、url、headers、body、captu</text><text x="1818" y="843" class="boxBody" fill="#43536a">  res、asserts</text><text x="1818" y="876" class="boxBody" fill="#43536a">• captures 从响应中提取变量</text><text x="1818" y="909" class="boxBody" fill="#43536a">• edge mappings 把变量传给后续步骤</text><text x="1818" y="942" class="boxBody" fill="#43536a">• 可选择 Environment 的 base_url</text><text x="1818" y="975" class="boxBody" fill="#43536a">• 支持 Run Local / Run Server，实时 step results，</text><text x="1818" y="1004" class="boxBody" fill="#43536a">  完成后写入 Histories</text></g>

<g id="histories"><rect x="1210" y="1165" width="500" height="220" rx="20" fill="#f8fafc" stroke="#c8d4e3" stroke-width="2" filter="url(#shadow)"/><rect x="1210" y="1165" width="8" height="220" rx="4" fill="#64748b"/><text x="1236" y="1205" class="boxTitle" fill="#102033">Histories：回看与追踪</text><text x="1238" y="1241" class="boxBody" fill="#43536a">• API Request 成功/失败写 cli_request 记录</text><text x="1238" y="1274" class="boxBody" fill="#43536a">• Flow 运行完成写 flow 记录</text><text x="1238" y="1307" class="boxBody" fill="#43536a">• 记录请求、响应、状态、耗时、环境信息</text><text x="1238" y="1340" class="boxBody" fill="#43536a">• 帮助用户理解刚才发生了什么</text></g>

<g id="cognitive"><rect x="1790" y="1165" width="500" height="255" rx="20" fill="#fffdf5" stroke="#c8d4e3" stroke-width="2" filter="url(#shadow)"/><rect x="1790" y="1165" width="8" height="255" rx="4" fill="#ca8a04"/><text x="1816" y="1205" class="boxTitle" fill="#102033">关键认知问题</text><text x="1818" y="1241" class="boxBody" fill="#43536a">• 我在哪里？Dashboard / Workspace / Module 标题需</text><text x="1818" y="1270" class="boxBody" fill="#43536a">  要清楚</text><text x="1818" y="1303" class="boxBody" fill="#43536a">• 下一步做什么？空状态、创建、Demo、发送、运行要显眼</text><text x="1818" y="1336" class="boxBody" fill="#43536a">• 系统是否反馈？loading、toast、响应面板、history</text><text x="1818" y="1369" class="boxBody" fill="#43536a">• 失败怎么办？表单校验、全局 HTTP 错误、运行错误写入 </text><text x="1818" y="1398" class="boxBody" fill="#43536a">  UI</text><text x="1818" y="1431" class="boxBody" fill="#43536a">• Request 是单次验证；Flow 是端到端场景验证</text></g>

  <path d="M 510 282 C 580 282, 580 215, 650 215" fill="none" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/><text x="580" y="238.5" text-anchor="middle" class="edgeLabel" fill="#64748b">登录</text>
  <path d="M 510 315 C 580 315, 580 475, 650 475" fill="none" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/><text x="580" y="385" text-anchor="middle" class="edgeLabel" fill="#64748b">注册</text>
  <path d="M 1070 215 C 1145 215, 1145 315, 1220 315" fill="none" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/><text x="1145" y="255" text-anchor="middle" class="edgeLabel" fill="#64748b">成功</text>
  <path d="M 1070 475 C 1145 475, 1145 350, 1220 350" fill="none" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/><text x="1145" y="402.5" text-anchor="middle" class="edgeLabel" fill="#64748b">自动登录成功</text>
  <path d="M 1690 305 C 1755 305, 1755 205, 1820 205" fill="none" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/><text x="1755" y="245" text-anchor="middle" class="edgeLabel" fill="#64748b">空状态</text>
  <path d="M 1690 360 C 1755 360, 1755 480, 1820 480" fill="none" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/><text x="1755" y="410" text-anchor="middle" class="edgeLabel" fill="#64748b">有项目 / 邀请</text>
  <path d="M 2045 315 L 2045 380" fill="none" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/><text x="2045" y="335.5" text-anchor="middle" class="edgeLabel" fill="#64748b">创建或选择</text>
  <path d="M 2045 580 C 1185 580, 1185 760, 325 760" fill="none" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/><text x="1185" y="660" text-anchor="middle" class="edgeLabel" fill="#64748b">进入项目</text>
  <path d="M 2045 315 C 1185 315, 1185 760, 325 760" fill="none" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/><text x="1185" y="527.5" text-anchor="middle" class="edgeLabel" fill="#64748b">进入 API Specs</text>

  <path d="M 560 875 C 610 875, 610 870, 660 870" fill="none" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/><text x="610" y="862.5" text-anchor="middle" class="edgeLabel" fill="#64748b">模块导航</text>
  <path d="M 1090 870 C 1150 870, 1150 870, 1210 870" fill="none" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/><text x="1150" y="860" text-anchor="middle" class="edgeLabel" fill="#64748b">单请求</text>
  <path d="M 1090 910 C 1440 910, 1440 880, 1790 880" fill="none" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/><text x="1440" y="885" text-anchor="middle" class="edgeLabel" fill="#64748b">多步骤</text>
  <path d="M 1460 1035 C 1460 1035, 1460 1165, 1460 1165" fill="none" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/><text x="1460" y="1090" text-anchor="middle" class="edgeLabel" fill="#64748b">执行结果</text>
  <path d="M 2040 1035 C 1750 1035, 1750 1165, 1460 1165" fill="none" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/><text x="1750" y="1090" text-anchor="middle" class="edgeLabel" fill="#64748b">运行历史</text>
  <path d="M 1710 870 C 1750 870, 1750 870, 1790 870" fill="none" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/><text x="1750" y="860" text-anchor="middle" class="edgeLabel" fill="#64748b">从单次验证升级为流程</text>

  <g transform="translate(95 1475)">
    <rect x="0" y="0" width="2190" height="110" rx="18" fill="#102033" opacity="0.96"/>
    <text x="32" y="42" class="boxTitle" fill="#ffffff">一句话总结</text>
    <text x="32" y="78" class="subtitle" fill="#dce7f3">注册/登录把用户带到项目 Dashboard；项目把用户带入工作区；API Request 解决“单个接口怎么跑通”，Request Flow 解决“多个接口如何按业务顺序联动验证”。</text>
  </g>
</svg>