# Zeabur deployment configuration
# https://zeabur.com/docs/deploy/config-edit

name: kest

services:
  api:
    build:
      dockerfile: Dockerfile
    ports:
      - 5119
    env:
      GIN_MODE: release
      SERVER_PORT: "5119"
      JWT_EXPIRE_DAYS: "1"
      CORS_ALLOW_ORIGINS: https://kest.app,https://www.kest.app
      DB_HOST: ${POSTGRES_HOST}
      DB_PORT: ${POSTGRES_PORT}
      DB_NAME: ${POSTGRES_DATABASE}
      DB_USERNAME: ${POSTGRES_USERNAME}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
    # Required secret to set in Zeabur dashboard:
    # - JWT_SECRET (generate a secure random string)
